<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Title }} — dream space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/dreamspace.css" />
</head>
<body class="dream-body">
  <nav class="ds-nav">
    <a href="/" class="ds-nav__home">← by stephanie navarro</a>
    <span class="ds-nav__title">dream space</span>
  </nav>
  <main class="ds-main">
    <article class="ds-post">
      <header class="ds-post__header">
        <time class="ds-post__date">{{ .Date.Format "January 2, 2006" }}</time>
        <h1 class="ds-post__title">{{ .Title }}</h1>
        {{ with .Params.excerpt }}<p class="ds-post__excerpt">{{ . }}</p>{{ end }}
      </header>
      <div class="ds-post__body">{{ .Content }}</div>
      <footer class="ds-post__footer">
        <a href="/dreamspace/" class="ds-back">← back to dream space</a>
      </footer>
    </article>
  </main>
  <footer class="ds-footer"><p>© {{ now.Year }} stephanie navarro</p></footer>
  <canvas id="ds-glitter" aria-hidden="true"></canvas>
  <script src="/js/dreamspace.js"></script>
</body>
</html>
