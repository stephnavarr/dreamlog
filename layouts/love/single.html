<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Title }} — love</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/love.css" />
</head>
<body class="love-body">
  <nav class="lv-nav">
    <a href="/" class="lv-nav__home">← by stephanie navarro</a>
    <span class="lv-nav__title">love</span>
  </nav>
  <main class="lv-main">
    <article class="lv-post">
      <header class="lv-post__header">
        <time class="lv-post__date">{{ .Date.Format "January 2, 2006" }}</time>
        <h1 class="lv-post__title">{{ .Title }}</h1>
        {{ with .Params.excerpt }}<p class="lv-post__excerpt">{{ . }}</p>{{ end }}
      </header>
      <div class="lv-post__body">{{ .Content }}</div>
      <footer class="lv-post__footer">
        <a href="/love/" class="lv-back">← back to love</a>
      </footer>
    </article>
  </main>
  <footer class="lv-footer"><p>© {{ now.Year }} stephanie navarro</p></footer>
  <canvas id="lv-glitter" aria-hidden="true"></canvas>
  <script src="/js/love.js"></script>
</body>
</html>
