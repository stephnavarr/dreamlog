<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Title }} — 21st century woman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/woman.css" />
</head>
<body class="woman-body">
  <nav class="w-nav">
    <a href="/" class="w-nav__home">← by stephanie navarro</a>
    <span class="w-nav__title">21st century woman</span>
  </nav>
  <main class="w-main">
    <article class="w-post">
      <header class="w-post__header">
        <div class="w-post__meta">
          <time class="w-post__date">{{ .Date.Format "January 2, 2006" }}</time>
          {{ with .Params.tags }}<span class="w-post__tag">{{ index . 0 }}</span>{{ end }}
        </div>
        <h1 class="w-post__title">{{ .Title }}</h1>
        {{ with .Params.excerpt }}<p class="w-post__excerpt">{{ . }}</p>{{ end }}
      </header>
      <div class="w-post__body">{{ .Content }}</div>
      <footer class="w-post__footer">
        <a href="/woman/" class="w-back">← back to 21st century woman</a>
      </footer>
    </article>
  </main>
  <footer class="w-footer"><p>© {{ now.Year }} stephanie navarro</p></footer>
</body>
</html>
